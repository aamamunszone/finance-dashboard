<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <!-- ==================== Basic Meta Tags ==================== -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />

    <!-- ==================== SEO Meta Tags ==================== -->
    <meta name="title" content="Finance Dashboard | Insights & Analytics" />
    <meta name="description" content="" />
    <meta name="keywords" content="" />
    <meta name="author" content="Abdullah Al Mamun (aamamunszone)" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />

    <!-- ==================== Open Graph Meta Tags (Social Media Preview) ==================== -->
    <meta
      property="og:title"
      content="Finance Dashboard | Insights & Analytics"
    />
    <meta property="og:description" content="" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="" />
    <meta property="og:image" content="" />
    <meta property="og:site_name" content="Finance Dashboard" />

    <!-- ==================== Favicon ==================== -->
    <link
      rel="shortcut icon"
      href="/finance-dashboard-favicon.png"
      type="image/x-icon"
    />

    <!-- ==================== Canonical URL ==================== -->
    <link rel="canonical" href="" />

    <!-- ==================== Title ==================== -->
    <title>Finance Dashboard | Insights & Analytics</title>

    <!-- ==================== Prevent flash of wrong theme ==================== -->
    <script>
      (function () {
        const stored = localStorage.getItem('darkMode');
        const prefersDark = window.matchMedia(
          '(prefers-color-scheme: dark)',
        ).matches;
        const isDark = stored !== null ? stored === 'true' : prefersDark;
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>

  <body>
    <!-- ==================== No JavaScript Fallback ==================== -->
    <noscript>
      <div
        style="
          padding: 20px;
          text-align: center;
          background: #fef2f2;
          color: #991b1b;
          font-family: system-ui;
        "
      >
        <h1>⚠️ JavaScript Required</h1>
        <p>
          Finance Dashboard requires JavaScript to be enabled for full
          functionality. Please enable JavaScript in your browser settings to
          continue.
        </p>
      </div>
    </noscript>

    <!-- ==================== React Root Mount Point ==================== -->
    <div id="root" aria-label="Finance Dashboard Root"></div>

    <!-- ==================== Entry Script (React / Vite) ==================== -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
